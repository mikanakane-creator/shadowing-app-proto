<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#FAFAF8">
<meta name="apple-mobile-web-app-title" content="シャドーイング">
<title>シャドーイング（仮）</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root { --accent: #4F46E5; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Hiragino Sans", "Hiragino Kaku Gothic ProN", sans-serif;
    background: #FAFAF8;
    color: #2D2D2D;
    -webkit-tap-highlight-color: transparent;
    min-height: 100dvh;
  }
  .en { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", Helvetica, Arial, sans-serif; }
  .btn-primary, .btn-secondary {
    border-radius: 1rem;
    padding: 1.1rem 1.5rem;
    min-height: 56px;
    font-size: 1.05rem; font-weight: 600;
    transition: opacity .15s, transform .05s;
    touch-action: manipulation;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-secondary { background: #EFEEEA; color: #2D2D2D; }
  .btn-primary:active, .btn-secondary:active { transform: scale(0.97); }
  .btn-primary:disabled { opacity: 0.35; }
  /* 画面下の最終ボタン領域（iPhone Safe Area＋Safariツールバー回避） */
  .bottom-bar {
    padding: 0.75rem 1.5rem;
    padding-bottom: max(2.5rem, calc(1rem + env(safe-area-inset-bottom)));
  }
  .dev-skip {
    color: #C9C6BE; font-size: 0.7rem;
    padding: 0.3rem 0.55rem; border-radius: 6px;
    border: 1px dashed #D7D5CE; line-height: 1;
  }
  .dev-skip:active { background: #EFEEEA; }
  .word-heard {
    color: #16A34A;
    transition: color .25s ease;
  }
  .blank-slot.peek {
    color: #B0AEA8;
    border-bottom-style: dashed;
    opacity: 0.85;
  }
  .chip {
    background: #fff; border: 1.5px solid #E2E0DA;
    border-radius: 0.9rem; padding: 0.55rem 1rem;
    font-size: 1.15rem; font-weight: 500;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04);
    transition: transform .05s;
  }
  .chip:active { transform: scale(0.95); }
  .chip.used { opacity: 0.25; pointer-events: none; }
  .blank-slot {
    display: inline-block; min-width: 3.2em; text-align: center;
    border-bottom: 2.5px solid #C9C6BE; padding: 0 0.2em;
    color: var(--accent); font-weight: 600;
  }
  .blank-slot.empty, .blank-slot.peek { cursor: pointer; }
  .blank-slot.empty { color: transparent; }
  .blank-slot.wrong { border-color: #DC2626; color: #DC2626; }
  .blank-slot.correct { border-color: #16A34A; color: #16A34A; }
  .mic-btn {
    width: 4.5rem; height: 4.5rem; border-radius: 9999px;
    background: var(--accent); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.8rem; box-shadow: 0 4px 14px rgba(79,70,229,0.35);
    transition: transform .1s;
  }
  .mic-btn:active { transform: scale(0.93); }
  .mic-btn.recording { background: #DC2626; animation: pulse 1.2s infinite; }
  @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(220,38,38,0.4); } 50% { box-shadow: 0 0 0 14px rgba(220,38,38,0); } }
  .fade-in { animation: fadeIn .25s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  input[type="text"], input[type="password"], input[type="number"], textarea, select {
    background: #fff; border: 1.5px solid #E2E0DA; border-radius: 0.9rem;
    padding: 0.8rem 1rem; font-size: 1rem; width: 100%;
  }
  input:focus, textarea:focus, select:focus { outline: none; border-color: var(--accent); }
</style>
</head>
<body>
<div class="max-w-md mx-auto flex flex-col" id="app" style="min-height: 100dvh"></div>

<script>
/* ============================================================
   定数
============================================================ */
const TIMER_SECONDS = 60;        // Step 4（話して埋める）
const DICTATION_SECONDS = 90;    // Step 2（全文ディクテーション）
const DUMMY_POOL = ["really", "never", "always", "people", "things", "maybe", "still", "right", "going", "want"];
const STOPWORDS = new Set(["the","a","an","is","are","was","were","be","been","being","i","you","he","she","it","we","they","of","to","in","on","at","and","but","or","this","that","these","those","what","do","does","did","have","has","had","my","your","his","her","its","our","their","me","him","them","us","for","with","about","as","so","not","no","yes","how","when","where","why","who","am","will","would","can","could","should","there","here","from","by","up","down","out","if","then","than","just","very"]);

const SEED_SENTENCES = [
  {
    id: 1,
    text: "I don't know how many kinds of coffee they have, but it's a lot.",
    ja: "何種類のコーヒーがあるのか分からないけど、とにかくたくさんある。",
    kw: [1, 2, 4, 5, 7, 9, 13],
    dummies: ["drink", "much"],
    meanings: { "know": "知っている", "kinds": "種類", "have": "持っている・ある", "don't": "〜しない", "many": "多くの", "coffee": "コーヒー", "lot": "たくさん" }
  },
  {
    id: 2,
    text: "Is this what you were talking about earlier today?",
    ja: "これが今日さっき話してたこと？",
    kw: [1, 2, 4, 5, 6, 7],
    dummies: ["where", "saying"],
    meanings: { "what": "何・〜のこと", "talking": "話している", "earlier": "さっき・先ほど", "this": "これ", "were": "〜していた", "about": "〜について" }
  },
  {
    id: 3,
    text: "She said she would come back, but I haven't heard from her since.",
    ja: "彼女は戻ってくると言ったけど、それ以来連絡がない。",
    kw: [1, 3, 4, 5, 8, 9, 12],
    dummies: ["could", "told"],
    meanings: { "would": "〜するつもりだった", "back": "戻って", "heard": "聞いた", "said": "言った", "come": "来る", "haven't": "〜していない", "since": "それ以来" }
  }
];

/* ============================================================
   設定・データストア
============================================================ */
const DEFAULT_SETTINGS = { provider: "openai", apiKey: "", voice: "nova", googleKey: "", googleVoice: "en-US-Neural2-F", goal: 30 };
function loadSettings() {
  try {
    const s = Object.assign({}, DEFAULT_SETTINGS, JSON.parse(localStorage.getItem("sw_settings") || "{}"));
    // 旧Gemini TTS時代の声名（Kore等）が残ってたらCloud TTSのデフォルトに直す
    if (s.googleVoice && !s.googleVoice.startsWith("en-")) s.googleVoice = DEFAULT_SETTINGS.googleVoice;
    return s;
  } catch (_) { return { ...DEFAULT_SETTINGS }; }
}
function saveSettings(s) { localStorage.setItem("sw_settings", JSON.stringify(s)); }
let settings = loadSettings();

function loadSentences() {
  try {
    const arr = JSON.parse(localStorage.getItem("sw_sentences") || "null");
    if (Array.isArray(arr) && arr.length) return arr;
  } catch (_) {}
  localStorage.setItem("sw_sentences", JSON.stringify(SEED_SENTENCES));
  return [...SEED_SENTENCES];
}
function saveSentences(arr) { localStorage.setItem("sw_sentences", JSON.stringify(arr)); }
let sentences = loadSentences();

/* ============================================================
   ユーティリティ
============================================================ */
const $ = (sel) => document.querySelector(sel);
const app = $("#app");
const esc = (s) => String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");

function tokenize(text) {
  return text.split(" ").map(raw => {
    const core = raw.replace(/[^a-zA-Z']/g, "");
    const suffix = raw.slice(raw.indexOf(core) + core.length);
    return { raw, core, suffix };
  });
}
function normalize(s) {
  return s.toLowerCase().replace(/[^a-z' ]/g, " ").replace(/\s+/g, " ").trim();
}
function matchRate(target, transcript) {
  const t = normalize(target).split(" ").filter(Boolean);
  const heard = normalize(transcript).split(" ").filter(Boolean);
  if (t.length === 0) return 0;
  const pool = [...heard];
  let hit = 0;
  for (const w of t) {
    const i = pool.indexOf(w);
    if (i >= 0) { hit++; pool.splice(i, 1); }
  }
  return Math.round((hit / t.length) * 100);
}
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function wordCount(text) { return tokenize(text).filter(t => t.core).length; }

function autoKeywords(text) {
  const tokens = tokenize(text);
  const wordIdx = tokens.map((t, i) => t.core ? i : -1).filter(i => i >= 0);
  const target = Math.max(2, Math.ceil(wordIdx.length / 2));
  let kw = wordIdx.filter(i => !STOPWORDS.has(tokens[i].core.toLowerCase()));
  if (kw.length > target) {
    // 長い単語（＝難しい単語）を優先して残す
    kw = kw.sort((a, b) => tokens[b].core.length - tokens[a].core.length).slice(0, target).sort((a, b) => a - b);
  } else if (kw.length < target) {
    const rest = wordIdx.filter(i => !kw.includes(i)).reverse();
    while (kw.length < target && rest.length) kw.push(rest.pop());
    kw.sort((a, b) => a - b);
  }
  return kw;
}

function autoDummies(text) {
  const words = new Set(tokenize(text).map(t => t.core.toLowerCase()).filter(Boolean));
  return DUMMY_POOL.filter(w => !words.has(w)).slice(0, 2);
}

/* ============================================================
   音声（OpenAI / Google Gemini TTS + IndexedDBキャッシュ
   → ブラウザTTSフォールバック）
============================================================ */
const GOOGLE_TEXT_MODEL = "gemini-2.5-flash";   // 訳生成のみ（TTSとは別API）

function aiKey() { return settings.provider === "google" ? settings.googleKey : settings.apiKey; }
function activeVoice() { return settings.provider === "google" ? settings.googleVoice : settings.voice; }
const dbp = new Promise((resolve) => {
  const req = indexedDB.open("sw_audio", 1);
  req.onupgradeneeded = () => req.result.createObjectStore("audio");
  req.onsuccess = () => resolve(req.result);
  req.onerror = () => resolve(null);
});
async function cacheGet(key) {
  const db = await dbp; if (!db) return null;
  return new Promise(r => {
    const t = db.transaction("audio").objectStore("audio").get(key);
    t.onsuccess = () => r(t.result || null);
    t.onerror = () => r(null);
  });
}
async function cachePut(key, blob) {
  const db = await dbp; if (!db) return;
  db.transaction("audio", "readwrite").objectStore("audio").put(blob, key);
}

async function fetchTTS(text) {
  if (settings.provider === "google") return fetchGoogleTTS(text);
  const res = await fetch("https://api.openai.com/v1/audio/speech", {
    method: "POST",
    headers: { "Authorization": `Bearer ${settings.apiKey}`, "Content-Type": "application/json" },
    body: JSON.stringify({ model: "gpt-4o-mini-tts", voice: settings.voice, input: text, response_format: "mp3" })
  });
  if (!res.ok) throw new Error("TTS API error: " + res.status);
  return await res.blob();
}

async function fetchGoogleTTS(text) {
  const res = await fetch(`https://texttospeech.googleapis.com/v1/text:synthesize?key=${encodeURIComponent(settings.googleKey)}`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      input: { text },
      voice: { languageCode: "en-US", name: settings.googleVoice },
      audioConfig: { audioEncoding: "MP3" }
    })
  });
  if (!res.ok) {
    const body = await res.text();
    const detail = (() => {
      try { return JSON.parse(body).error?.message || body; } catch { return body; }
    })().slice(0, 200);
    throw new Error(`Cloud TTS ${res.status}: ${detail}`);
  }
  const data = await res.json();
  if (!data.audioContent) throw new Error("Cloud TTS: 応答に音声データなし");
  const bin = atob(data.audioContent);
  const arr = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  return new Blob([arr], { type: "audio/mp3" });
}

// 無音アンロック用（PCM→WAV）。unlockAudio で使用
function pcmToWav(b64, sampleRate) {
  const bin = atob(b64);
  const pcm = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) pcm[i] = bin.charCodeAt(i);
  const header = new ArrayBuffer(44);
  const v = new DataView(header);
  const ws = (off, s) => { for (let i = 0; i < s.length; i++) v.setUint8(off + i, s.charCodeAt(i)); };
  ws(0, "RIFF"); v.setUint32(4, 36 + pcm.length, true); ws(8, "WAVE");
  ws(12, "fmt "); v.setUint32(16, 16, true); v.setUint16(20, 1, true); v.setUint16(22, 1, true);
  v.setUint32(24, sampleRate, true); v.setUint32(28, sampleRate * 2, true);
  v.setUint16(32, 2, true); v.setUint16(34, 16, true);
  ws(36, "data"); v.setUint32(40, pcm.length, true);
  return new Blob([header, pcm], { type: "audio/wav" });
}

let enVoice = null;
function pickVoice() {
  const vs = speechSynthesis.getVoices();
  enVoice = vs.find(v => v.lang === "en-US" && v.name.includes("Samantha"))
         || vs.find(v => v.lang === "en-US")
         || vs.find(v => v.lang.startsWith("en"))
         || null;
}
speechSynthesis.onvoiceschanged = pickVoice;
pickVoice();

const audioEl = new Audio();
function stopAudio() {
  audioEl.pause();
  speechSynthesis.cancel();
}

// iOS Safariはユーザー操作と無関係なaudio.play()をブロックするため、
// 最初のタップで無音WAVを別Audioで再生して、後続のaudioEl.play()を解禁する
// （audioElを直接いじるとStep1で再生中のTTSを壊してマイクも巻き込む不具合があった）
const unlockEl = new Audio();
let audioUnlocked = false;
function unlockAudio() {
  if (audioUnlocked) return;
  audioUnlocked = true;
  try {
    unlockEl.src = URL.createObjectURL(pcmToWav(btoa("\0".repeat(400)), 8000));
    const p = unlockEl.play();
    if (p && p.catch) p.catch(() => { audioUnlocked = false; });
  } catch (_) { audioUnlocked = false; }
}
document.addEventListener("touchend", unlockAudio, true);
document.addEventListener("click", unlockAudio, true);

function toast(msg) {
  let el = document.getElementById("toast");
  if (!el) {
    el = document.createElement("div");
    el.id = "toast";
    el.style.cssText = "position:fixed;top:calc(env(safe-area-inset-top) + 60px);left:50%;transform:translateX(-50%);background:#2D2D2D;color:#fff;padding:12px 18px;border-radius:12px;font-size:12px;line-height:1.5;z-index:50;max-width:92%;transition:opacity .3s;word-break:break-word;cursor:pointer;";
    el.onclick = () => { el.style.opacity = "0"; };
    document.body.appendChild(el);
  }
  el.textContent = msg;
  el.style.opacity = "1";
  clearTimeout(toast._t);
  toast._t = setTimeout(() => { el.style.opacity = "0"; }, 6000);
}

async function speak(text, rate = 1.0) {
  stopAudio();
  if (aiKey()) {
    try {
      const key = `${settings.provider}|${activeVoice()}|${text}`;
      let blob = await cacheGet(key);
      if (!blob) { blob = await fetchTTS(text); cachePut(key, blob); }
      audioEl.src = URL.createObjectURL(blob);
      audioEl.playbackRate = rate;
      await audioEl.play();
      return;
    } catch (e) {
      console.warn("AI TTS失敗。ブラウザ音声にフォールバック:", e);
      toast(`⚠️ AI音声を再生できず、内蔵音声で代用中（${e.message}）`);
    }
  }
  const u = new SpeechSynthesisUtterance(text);
  if (enVoice) u.voice = enVoice;
  u.lang = "en-US";
  u.rate = rate === 1.0 ? 0.95 : rate;
  speechSynthesis.speak(u);
}

/* ============================================================
   音声認識
============================================================ */
const SR = window.SpeechRecognition || window.webkitSpeechRecognition || null;
let activeRec = null;

function listen(onResult, onEnd) {
  if (!SR) { onEnd && onEnd(); return null; }
  toast("🎤 録音中... 話して");
  const rec = new SR();
  rec.lang = "en-US";
  rec.interimResults = false;
  rec.continuous = false;
  rec.maxAlternatives = 1;
  let fired = false;
  rec.onstart = () => toast("🎤 録音中... 話して");
  rec.onspeechstart = () => toast("🎙️ 声を検出！");
  rec.onresult = (e) => {
    if (fired) return;
    fired = true;
    const text = e.results[0]?.[0]?.transcript || "";
    toast(`✅ 認識: "${text}"`);
    onResult(text);
  };
  rec.onerror = (e) => {
    if (fired) return;
    fired = true;
    toast(`❌ マイクエラー: ${e.error || "unknown"}`);
    onEnd && onEnd();
  };
  rec.onend = () => {
    if (fired) return;
    fired = true;
    toast(`⚠️ 録音終了したけど結果なし（声が小さい or マイク許可？）`);
    onEnd && onEnd();
  };
  try { rec.start(); } catch (e) {
    fired = true;
    toast(`❌ マイク開始失敗: ${e.message}`);
    onEnd && onEnd();
    return null;
  }
  activeRec = rec;
  return rec;
}
function stopListen() {
  if (activeRec) { try { activeRec.stop(); } catch (_) {} activeRec = null; }
}

/* ============================================================
   進捗
============================================================ */
function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
function loadProgress() {
  try {
    const p = JSON.parse(localStorage.getItem("sw_progress") || "null");
    if (p && p.date === todayKey()) return p;
  } catch (_) {}
  return { date: todayKey(), words: 0, done: [] };
}
function saveProgress(p) { localStorage.setItem("sw_progress", JSON.stringify(p)); }

/* ============================================================
   状態
============================================================ */
let S = {
  sentence: null,
  step: 0,
  filled: {},
  bank: [],
  blanks: [],
  checked: false,
  timeLeft: TIMER_SECONDS,
  drillQueue: [],
  drillHint: 0,
  round: 1,
  sfRound: 1,
  recOn: false,
  heard: new Set(),   // Step 4: 音声認識で読めた単語（小文字core）
  peeked: {},         // Step 4: タップで答えをチラ見した空白 {tokenIndex: true}
};

let timerInterval = null;
function clearTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}

/* ============================================================
   画面骨格
============================================================ */
function header(title, showBack = true, showSkip = true) {
  return `
  <div class="flex items-center px-5 pt-6 pb-3">
    ${showBack ? `<button onclick="goHome()" class="text-gray-400 text-2xl leading-none mr-3 px-2">‹</button>` : `<span class="w-8"></span>`}
    <div class="flex-1 text-center font-semibold text-gray-500 text-sm tracking-wide">${title}</div>
    ${showSkip ? `<button onclick="devSkip()" class="dev-skip">skip ›</button>` : `<span class="w-8"></span>`}
  </div>`;
}

/* 開発用：現在のStepを飛ばして次画面へ */
function devSkip() {
  clearTimer(); stopListen(); stopAudio();
  const step = S.step;
  if (step === 1) gotoTapFill();
  else if (step === 2) gotoMeaning();
  else if (step === 2.5) renderStep3();
  else if (step === 3) gotoSpeakFill(1);
  else if (step === 4) {
    if (S.sfRound >= 4) { S.round = 1; renderStep5(); }
    else gotoSpeakFill(S.sfRound + 1);
  }
  else if (step === 5) {
    if (S.round >= STEP5_ROUNDS.length) finishSession();
    else { S.round++; renderStep5(); }
  }
  else goHome();
}
function stepDots(current) {
  let dots = "";
  for (let i = 1; i <= 5; i++) {
    dots += `<span class="inline-block w-2 h-2 rounded-full mx-1 ${i === current ? "bg-indigo-600 scale-125" : i < current ? "bg-indigo-300" : "bg-gray-300"}" style="transition:all .2s"></span>`;
  }
  return `<div class="text-center mb-1">${dots}</div>`;
}
function timerBadge() {
  const m = Math.floor(S.timeLeft / 60), s = String(S.timeLeft % 60).padStart(2, "0");
  const danger = S.timeLeft <= 10;
  return `<div id="timer" class="text-center text-sm font-semibold mb-3 ${danger ? "text-red-500" : "text-gray-400"}">⏱ ${m}:${s}</div>`;
}

/* ============================================================
   ホーム
============================================================ */
function goHome() {
  clearTimer(); stopListen(); stopAudio();
  const p = loadProgress();
  const goal = settings.goal || 30;
  const pct = Math.min(100, Math.round((p.words / goal) * 100));
  const items = sentences.map(s => {
    const done = p.done.includes(s.id);
    return `
    <div class="relative mb-3 fade-in">
      <button onclick="startSession(${s.id})" class="w-full text-left bg-white rounded-2xl px-5 py-4 shadow-sm border border-gray-100 ${done ? "opacity-60" : ""}">
        <div class="en text-lg font-medium leading-snug pr-6">${esc(s.text)}</div>
        ${s.ja ? `<div class="text-xs text-gray-400 mt-1">${esc(s.ja)}</div>` : ""}
        <div class="flex items-center mt-2 text-sm text-gray-400">
          <span>${wordCount(s.text)}語</span>
          ${done ? `<span class="ml-auto text-green-600 font-semibold">✓ 完了</span>` : `<span class="ml-auto text-indigo-500 font-semibold">はじめる ›</span>`}
        </div>
      </button>
      <button onclick="removeSentence(${s.id})" class="absolute top-3 right-3 text-gray-300 hover:text-red-400 text-lg leading-none px-1">×</button>
    </div>`;
  }).join("");

  app.innerHTML = `
    <div class="flex items-center px-5 pt-6 pb-3">
      <span class="w-8"></span>
      <div class="flex-1 text-center font-semibold text-gray-500 text-sm tracking-wide">シャドーイング（仮）</div>
      <button onclick="renderSettings()" class="w-8 text-xl text-gray-400">⚙️</button>
    </div>
    <div class="px-5 flex-1" style="padding-bottom: calc(2.5rem + env(safe-area-inset-bottom))">

async function enrichSentence(text, kwWords) {
  const prompt = `Translate this English sentence into natural Japanese, and give a brief Japanese gloss (1-4 words) for each listed word as used in this sentence. Reply in JSON only: {"ja": "...", "meanings": {"word": "意味"}}\nSentence: ${text}\nWords: ${kwWords.join(", ")}`;
  if (settings.provider === "google") {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${GOOGLE_TEXT_MODEL}:generateContent?key=${encodeURIComponent(settings.googleKey)}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        contents: [{ parts: [{ text: prompt }] }],
        generationConfig: { responseMimeType: "application/json" }
      })
    });
    if (!res.ok) throw new Error("API error " + res.status);
    const data = await res.json();
    return JSON.parse(data.candidates[0].content.parts[0].text);
  }
  const res = await fetch("https://api.openai.com/v1/chat/completions", {
    method: "POST",
    headers: { "Authorization": `Bearer ${settings.apiKey}`, "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "gpt-4o-mini",
      response_format: { type: "json_object" },
      messages: [{ role: "user", content: prompt }]
    })
  });
  if (!res.ok) throw new Error("API error " + res.status);
  const data = await res.json();
  return JSON.parse(data.choices[0].message.content);
}

async function addSentences() {
  const raw = $("#addText").value;
  const lines = raw.split("\n").map(l => l.trim()).filter(l => l && wordCount(l) >= 2);
  if (!lines.length) return;
  $("#addBtn").disabled = true;

  let added = 0;
  for (const line of lines) {
    const kw = autoKeywords(line);
    const tokens = tokenize(line);
    const kwWords = kw.map(i => tokens[i].core);
    const s = {
      id: Date.now() + added,
      text: line,
      ja: "",
      kw,
      dummies: autoDummies(line),
      meanings: {}
    };
    if (aiKey()) {
      renderAddSentence(`✨ AIが訳を生成中… (${added + 1}/${lines.length})`);
      try {
        const enriched = await enrichSentence(line, kwWords);
        s.ja = enriched.ja || "";
        s.meanings = enriched.meanings || {};
      } catch (e) {
        console.warn("enrich失敗:", e);
      }
    }
    sentences.push(s);
    added++;
  }
  saveSentences(sentences);
  goHome();
}

/* ============================================================
   Step 2: ディクテーション（タップ穴埋め・ほぼ全文）
============================================================ */
function gotoTapFill() {
  clearTimer(); stopListen();
  S.step = 2;
  const tokens = tokenize(S.sentence.text);
  S.blanks = tokens.map((t, i) => t.core ? i : -1).filter(i => i >= 0);
  const answers = S.blanks.map(i => tokens[i].core);
  S.filled = {};
  S.checked = false;
  S.bank = shuffle([...answers, ...(S.sentence.dummies || []).slice(0, 2)]);
  S.timeLeft = DICTATION_SECONDS;
  renderTapFill();
  startTapFillTimer();
}

function startTapFillTimer() {
  clearTimer();
  timerInterval = setInterval(() => {
    S.timeLeft--;
    const el = $("#timer");
    if (el) {
      const m = Math.floor(S.timeLeft / 60), s = String(S.timeLeft % 60).padStart(2, "0");
      el.textContent = `⏱ ${m}:${s}`;
      if (S.timeLeft <= 10) el.classList.add("text-red-500");
    }
    if (S.timeLeft <= 0) {
      clearTimer();
      onTapFillTimeout();
    }
  }, 1000);
}

function blanksOf() { return S.blanks; }

function renderTapFill() {
  const tokens = tokenize(S.sentence.text);
  const blanks = blanksOf();

  const sentenceHtml = tokens.map((t, i) => {
    if (!blanks.includes(i)) return `<span>${t.raw}</span>`;
    const word = S.filled[i];
    let cls = "blank-slot" + (word ? "" : " empty");
    if (S.checked && word) cls += word.toLowerCase() === t.core.toLowerCase() ? " correct" : " wrong";
    const display = word || "_".repeat(Math.max(3, t.core.length));
    return `<span class="${cls}" onclick="unfill(${i})">${display}</span><span>${t.suffix}</span>`;
  }).join(" ");

  const usedWords = Object.values(S.filled);
  const bankHtml = S.bank.map((w, bi) => {
    const usedCount = usedWords.filter(x => x === w).length;
    const thisUsed = S.bank.slice(0, bi + 1).filter(x => x === w).length <= usedCount;
    return `<button class="chip ${thisUsed ? "used" : ""}" onclick="fillWord('${w.replace(/'/g, "\\'")}')">${w}</button>`;
  }).join("");

  const allFilled = blanks.every(i => S.filled[i]);
  const allCorrect = S.checked && blanks.every(i => S.filled[i] && S.filled[i].toLowerCase() === tokens[i].core.toLowerCase());

  app.innerHTML = `
    ${header("Step 2 · ディクテーション")}
    ${stepDots(2)}
    ${timerBadge()}
    <div class="flex-1 px-6 fade-in">
      <div class="en text-2xl leading-relaxed font-medium bg-white rounded-2xl px-5 py-6 shadow-sm border border-gray-100 mb-5">
        ${sentenceHtml}
      </div>
      <button class="btn-secondary w-full mb-6 text-base" onclick="speak(S.sentence.text)">🔊 もう一回聞く</button>
      <div class="flex flex-wrap gap-2 justify-center">${bankHtml}</div>
    </div>
    <div class="bottom-bar">
      ${allCorrect
        ? `<button class="btn-primary w-full" onclick="afterTapFill()">正解！次へ</button>`
        : `<button class="btn-primary w-full" ${allFilled ? "" : "disabled"} onclick="checkTapFill()">答え合わせ</button>`}
    </div>`;
}

function fillWord(w) {
  const blanks = blanksOf();
  const empty = blanks.find(i => !S.filled[i]);
  if (empty === undefined) return;
  S.filled[empty] = w;
  S.checked = false;
  renderTapFill();
}

function unfill(i) {
  if (!S.filled[i]) return;
  delete S.filled[i];
  S.checked = false;
  renderTapFill();
}

function checkTapFill() {
  S.checked = true;
  const tokens = tokenize(S.sentence.text);
  const blanks = blanksOf();
  const ok = (i) => S.filled[i] && S.filled[i].toLowerCase() === tokens[i].core.toLowerCase();
  const allCorrect = blanks.every(ok);
  if (allCorrect) {
    clearTimer();
    speak(S.sentence.text);
  } else {
    blanks.forEach(i => {
      if (S.filled[i] && !ok(i)) {
        setTimeout(() => { delete S.filled[i]; S.checked = false; renderTapFill(); }, 1200);
      }
    });
  }
  renderTapFill();
}

function afterTapFill() {
  clearTimer();
  gotoMeaning();
}

/* ============================================================
   意味の確認（Step 2 → Step 3 の間）
============================================================ */
async function gotoMeaning() {
  clearTimer(); stopListen();
  const s = S.sentence;
  if (!s.ja && aiKey()) {
    renderMeaning(true);
    try {
      const kw = s.kw || autoKeywords(s.text);
      const tokens = tokenize(s.text);
      const enriched = await enrichSentence(s.text, kw.map(i => tokens[i].core));
      s.ja = enriched.ja || "";
      s.meanings = enriched.meanings || {};
      const idx = sentences.findIndex(x => x.id === s.id);
      if (idx >= 0) { sentences[idx] = s; saveSentences(sentences); }
    } catch (e) {
      console.warn("訳の生成に失敗:", e);
      toast(`⚠️ 訳を生成できませんでした（${e.message}）`);
    }
  }
  renderMeaning();
}

function renderMeaning(loading = false) {
  S.step = 2.5;
  const s = S.sentence;
  const meanings = Object.entries(s.meanings || {});
  app.innerHTML = `

          ? `<div class="text-indigo-500 text-sm font-semibold">✨ AIが日本語訳を生成中…</div>`
          : s.ja
          ? `<div class="text-gray-600 leading-relaxed">${esc(s.ja)}</div>`
          : `<div class="text-gray-400 text-sm">日本語訳は未生成です（⚙️設定でAPIキーを入れると自動生成されます）</div>`}
      </div>

      <div class="bg-white rounded-2xl px-5 py-4 shadow-sm border border-gray-100 mb-4">
        <div class="text-xs font-semibold text-gray-400 mb-2">単語の意味</div>
        ${meanings.map(([w, m]) => `
          <div class="flex items-baseline py-1.5 border-b border-gray-50 last:border-0">
            <span class="en font-semibold text-gray-700 w-28 shrink-0">${esc(w)}</span>
            <span class="text-gray-500 text-sm">${esc(m)}</span>
          </div>`).join("")}
      </div>` : ""}
      <button class="btn-secondary w-full text-base" onclick="speak(S.sentence.text)">🔊 意味を思い浮かべながら聞く</button>
    </div>
    <div class="bottom-bar">
      <button class="btn-primary w-full" ${loading ? "disabled" : ""} onclick="renderStep3()">意味OK、音読へ</button>
    </div>`;
}

function onTapFillTimeout() {
  const tokens = tokenize(S.sentence.text);
  const blanks = blanksOf();
  const missed = blanks
    .filter(i => !S.filled[i] || S.filled[i].toLowerCase() !== tokens[i].core.toLowerCase())
    .map(i => tokens[i].core);
  if (missed.length === 0) { afterTapFill(); return; }
  S.drillQueue = [...new Set(missed)].slice(0, 3);
  S.drillHint = 0;
  renderMicroDrill();
}

/* ============================================================
   マイクロドリル（救済）
============================================================ */
function renderMicroDrill(result = null) {
  stopListen();
  const word = S.drillQueue[0];
  const meaning = S.sentence.meanings[word] || "（意味データなし）";
  const hints = [];
  if (S.drillHint >= 1) hints.push(`<div class="text-gray-500 tracking-[0.35em] text-xl en">${word.toUpperCase().split("").join(" ")}</div>`);
  if (S.drillHint >= 2) hints.push(`<div class="text-gray-500 text-lg">意味：${esc(meaning)}</div>`);
  if (S.drillHint >= 3) hints.push(`<div class="text-indigo-500 text-base">お手本を再生したよ。続けて言ってみて</div>`);

  app.innerHTML = `
    ${header("ちょっと練習", true, false)}
    <div class="flex-1 flex flex-col items-center justify-center px-8 fade-in">
      <p class="text-gray-400 text-sm mb-6">この単語だけ、いったん練習しよう</p>
      <div class="en text-5xl font-bold mb-6 tracking-wide">${word}</div>
      <div class="space-y-3 text-center mb-8 min-h-[3rem]">${hints.join("")}</div>
      ${result === "ok"
        ? `<div class="text-green-600 font-bold text-xl mb-6">👏 いいね！</div>`
        : result === "ng"
        ? `<div class="text-red-500 font-semibold mb-6">もう一回いってみよう</div>`
        : ""}
      <button id="drillMic" class="mic-btn mb-8" onclick="drillSpeak()">🎤</button>
      <div class="flex gap-3 w-full">
        <button class="btn-secondary flex-1" onclick="drillHint()">ヒント</button>
        <button class="btn-secondary flex-1" onclick="speak('${word.replace(/'/g, "\\'")}', 0.8)">🔊 聞く</button>
      </div>
      ${!SR ? `<button class="mt-4 text-indigo-500 font-semibold" onclick="drillPass()">言えた（OKで進む）</button>`
            : `<button class="mt-4 text-gray-400 text-sm" onclick="drillPass()">言えたことにして進む</button>`}
    </div>`;
}

function drillHint() {
  S.drillHint = Math.min(3, S.drillHint + 1);
  if (S.drillHint === 3) speak(S.drillQueue[0], 0.8);
  renderMicroDrill();
}

function drillSpeak() {
  const word = S.drillQueue[0];
  const btn = $("#drillMic");
  btn.classList.add("recording");
  let got = false;
  listen(
    (transcript) => {
      got = true;
      const ok = normalize(transcript).split(" ").includes(normalize(word));
      if (ok) drillPass();
      else renderMicroDrill("ng");
    },
    () => { if (!got) renderMicroDrill(SR ? "ng" : null); }
  );
}

function drillPass() {
  stopListen();
  S.drillQueue.shift();
  S.drillHint = 0;
  if (S.drillQueue.length > 0) {
    renderMicroDrill("ok");
  } else {
    S.checked = false;
    if (S.step === 4) {
      S.timeLeft = TIMER_SECONDS;
      renderSpeakFill();
    } else {
      S.timeLeft = DICTATION_SECONDS;
      renderTapFill();
    }
    startTapFillTimer();
  }
}

function readAloud() {
  const btn = $("#readMic");

}

/* ============================================================
   Step 4: 話して埋める（4ラウンド段階式）
============================================================ */
const SF_ROUND_LABELS = ["ウォームアップ — 穴は2つ", "半分くらい穴", "ほとんど穴", "ほぼ全部穴"];

function speakFillBlanksForRound(round) {
  const tokens = tokenize(S.sentence.text);
  const wordIdx = tokens.map((t, i) => t.core ? i : -1).filter(i => i >= 0);
  const kw = S.sentence.kw || autoKeywords(S.sentence.text);
  if (round === 1) return kw.slice(0, 2);
  if (round === 2) return [...kw].sort((a, b) => a - b);
  if (round === 3) {
    const rest = wordIdx.filter(i => !kw.includes(i));
    const extra = rest.filter((_, k) => k % 2 === 0);
    return [...kw, ...extra].sort((a, b) => a - b);
  }
  return wordIdx.slice(1);
}

function gotoSpeakFill(round = 1) {
  clearTimer(); stopListen();
  S.step = 4;
  S.sfRound = round;
  S.blanks = speakFillBlanksForRound(round);
  S.filled = {};
  S.heard = new Set();
  S.peeked = {};
  S.recOn = false;
  S.timeLeft = TIMER_SECONDS;
  renderSpeakFill();
  startTapFillTimer();
}

function nextSfRound() {
  clearTimer(); stopListen();
  if (S.sfRound >= 4) { S.round = 1; renderStep5(); }
  else gotoSpeakFill(S.sfRound + 1);
}

function renderSpeakFill() {
  const tokens = tokenize(S.sentence.text);
  const blanks = S.blanks;
  const heard = S.heard || new Set();
  const peeked = S.peeked || {};
  const peekCount = Object.keys(peeked).filter(i => !S.filled[i]).length;

  const sentenceHtml = tokens.map((t, i) => {
    const coreLower = t.core ? t.core.toLowerCase() : "";
    if (!blanks.includes(i)) {
      // 空白でない単語：読めたら緑にハイライト
      const isHeard = coreLower && heard.has(coreLower);
      return `<span class="${isHeard ? "word-heard" : ""}">${t.raw}</span>`;
    }
    // 空白の単語
    const word = S.filled[i];
    if (word) {
      // 読めた → 緑filled
      return `<span class="blank-slot correct">${word}</span><span>${t.suffix}</span>`;
    }
    if (peeked[i]) {
      // チラ見中 → 薄グレーで答え表示
      return `<span class="blank-slot peek" onclick="unpeekBlank(${i})">${t.core}</span><span>${t.suffix}</span>`;
    }
    // 未着手 → タップでチラ見可能
    const display = "_".repeat(Math.max(3, t.core.length));
    return `<span class="blank-slot empty" onclick="peekBlank(${i})">${display}</span><span>${t.suffix}</span>`;
  }).join(" ");

  const allFilled = blanks.every(i => S.filled[i]);

  app.innerHTML = `
    ${header("Step 4 · 話して埋める")}
    ${stepDots(4)}
    <div class="text-center mb-2">
      <span class="inline-block bg-indigo-50 text-indigo-600 text-sm font-bold rounded-full px-4 py-1">${S.sfRound} / 4 — ${SF_ROUND_LABELS[S.sfRound - 1]}</span>
    </div>
    ${allFilled ? "" : timerBadge()}
    <div class="flex-1 flex flex-col px-6 fade-in">
      <div class="en text-2xl leading-relaxed font-medium bg-white rounded-2xl px-5 py-6 shadow-sm border border-gray-100 mb-4">
        ${sentenceHtml}
      </div>
      <p class="text-gray-400 text-xs text-center mb-5 leading-relaxed">
        言えた単語が緑になるよ。<br>
        ${peekCount > 0 ? `<span class="text-indigo-500">${peekCount}個チラ見中。発音すれば緑になって通過できる</span>` : `思い出せない空白はタップでチラ見できる`}
      </p>
      <div class="flex flex-col items-center">
        <div class="flex gap-3 mb-6 w-full">
          <button class="btn-secondary flex-1" onclick="speak(S.sentence.text)">🔊 お手本</button>
          <button class="btn-secondary flex-1" onclick="speak(S.sentence.text, 0.75)">🐢 ゆっくり</button>
        </div>
        ${allFilled
          ? `<div class="text-green-600 font-bold text-xl mb-4">👏 全部言えた！</div>`
          : SR
          ? `<button id="speakFillMicBtn" class="mic-btn mb-4 ${S.recOn ? "recording" : ""}" onclick="toggleSpeakFillMic()">🎤</button>
             <p class="text-gray-300 text-xs mb-2">${S.recOn ? "聞いてるよ…話して！" : "マイクを押してスタート"}</p>`
          : `<p class="text-gray-400 text-sm mb-4">※ 音声認識非対応ブラウザです</p>`}
      </div>
    </div>
    <div class="bottom-bar">
      ${allFilled
        ? `<button class="btn-primary w-full" onclick="nextSfRound()">${S.sfRound >= 4 ? "クリア！仕上げへ" : "次のラウンドへ"}</button>`
        : !SR
        ? `<button class="btn-primary w-full" onclick="nextSfRound()">OKで進む（音声認識なし）</button>`
        : `<button class="btn-secondary w-full opacity-50" onclick="nextSfRound()">スキップ</button>`}
    </div>`;
}

function toggleSpeakFillMic() {
  if (S.recOn) { S.recOn = false; stopListen(); renderSpeakFill(); return; }
  if (!SR) return;
  S.recOn = true;
  const rec = new SR();
  rec.lang = "en-US";
  rec.continuous = true;
  rec.interimResults = true;
  rec.onresult = (e) => {
    let transcript = "";
    for (const r of e.results) transcript += r[0].transcript + " ";
    applySpeakFill(transcript);
  };
  rec.onend = () => { S.recOn = false; renderSpeakFill(); };
  rec.onerror = () => { S.recOn = false; renderSpeakFill(); };
  try { rec.start(); activeRec = rec; } catch (_) { S.recOn = false; }
  renderSpeakFill();
}

function applySpeakFill(transcript) {
  const tokens = tokenize(S.sentence.text);
  const words = normalize(transcript).split(" ").filter(Boolean);
  // 認識した全単語をheardに蓄積（非空白部分のハイライトに使う）
  for (const w of words) S.heard.add(w);
  // 空白の埋まり判定：先頭から順番に拾う（既存ロジック踏襲）
  S.filled = {};
  let p = 0;
  for (const i of S.blanks) {
    const target = tokens[i].core.toLowerCase();
    const found = words.indexOf(target, p);
    if (found >= 0) {
      S.filled[i] = tokens[i].core;
      delete S.peeked[i];   // 発音できたらpeek解除
      p = found + 1;
    }
  }
  const allFilled = S.blanks.every(i => S.filled[i]);
  if (allFilled) { clearTimer(); stopListen(); S.recOn = false; }
  renderSpeakFill();
}

function peekBlank(i) {
  if (!S.blanks.includes(i) || S.filled[i]) return;
  S.peeked[i] = true;
  renderSpeakFill();
}
function unpeekBlank(i) {
  delete S.peeked[i];
  renderSpeakFill();
}

/* ============================================================
   Step 5: オーバーラッピング → シャドーイング
============================================================ */
const STEP5_ROUNDS = [
  { type: "overlap", label: "オーバーラッピング", desc: "全文を見ながら、音声にぴったり重ねて話す" },
  { type: "shadow",  label: "シャドーイング",     desc: "仕上げ。文は見ずに、音声を追いかけて話す" },
];

function renderStep5(score = null) {
  stopListen();
  S.step = 5;
  const round = S.round || 1;
  const r = STEP5_ROUNDS[round - 1];

  const body = r.type === "overlap"
    ? `<div class="en text-2xl leading-relaxed font-medium bg-white rounded-2xl px-5 py-6 shadow-sm border border-gray-100 mb-4">
         ${S.sentence.text}
       </div>`
    : `<div class="bg-white rounded-2xl px-5 py-10 shadow-sm border border-gray-100 mb-4 text-center">
         <div class="text-5xl mb-3">🎧</div>
         <div class="text-gray-400 text-sm">文は隠したよ。音だけを頼りに。</div>
       </div>`;

  app.innerHTML = `
    ${header("Step 5 · 仕上げ")}
    ${stepDots(5)}
    <div class="text-center mb-2">
      <span class="inline-block bg-indigo-50 text-indigo-600 text-sm font-bold rounded-full px-4 py-1">${round} / ${STEP5_ROUNDS.length} — ${r.label}</span>
    </div>
    <div class="flex-1 flex flex-col px-6 fade-in">
      ${body}
      <p class="text-gray-400 text-sm text-center mb-5">${r.desc}</p>
      <div class="flex flex-col items-center">
        <div class="flex gap-3 mb-6 w-full">
          <button class="btn-secondary flex-1" onclick="speak(S.sentence.text)">🔊 再生</button>
          <button class="btn-secondary flex-1" onclick="speak(S.sentence.text, 0.75)">🐢 ゆっくり</button>
        </div>
        ${r.type === "shadow" && SR ? `
          <button id="shadowMic" class="mic-btn mb-3" onclick="shadowSpeak()">🎤</button>
          <p class="text-gray-300 text-xs mb-3">覚えた文を言ってセルフチェックもできるよ</p>` : ""}
        ${score !== null ? `
          <div class="text-center mb-3">
            <div class="text-3xl font-bold ${score >= 60 ? "text-green-600" : "text-amber-500"}">${score}%</div>
            <div class="text-gray-400 text-xs">一致率</div>
          </div>` : ""}
      </div>
    </div>
    <div class="bottom-bar">
      <button class="btn-primary w-full" onclick="nextRound()">${round >= STEP5_ROUNDS.length ? "セッション完了！" : "できた、次へ"}</button>
    </div>`;
}

function shadowSpeak() {
  const btn = $("#shadowMic");
  btn.classList.add("recording");
  let got = false;
  listen(
    (transcript) => { got = true; renderStep5(matchRate(S.sentence.text, transcript)); },
    () => { if (!got) renderStep5(SR ? 0 : null); }
  );
}

function nextRound() {
  stopListen();
  if (S.round >= STEP5_ROUNDS.length) {
    finishSession();
  } else {
    S.round++;
    renderStep5();
  }
}

/* ============================================================
   セッション完了 / 1日完了
============================================================ */
function finishSession() {
  S.round = 1;
  const p = loadProgress();
  if (!p.done.includes(S.sentence.id)) {
    p.done.push(S.sentence.id);
    p.words += wordCount(S.sentence.text);
    saveProgress(p);
  }
  const goal = settings.goal || 30;
  if (p.words >= goal) renderDayComplete(p);
  else renderSessionComplete(p, goal);
}

function renderSessionComplete(p, goal) {
  app.innerHTML = `
    ${header("", false, false)}
    <div class="flex-1 flex flex-col items-center justify-center px-8 fade-in">
      <div class="text-6xl mb-6">🎉</div>
      <div class="text-2xl font-bold mb-2">1本クリア！</div>
      <p class="text-gray-500 mb-8">今日のワード数：<span class="font-bold text-indigo-600">${p.words}</span> / ${goal}</p>
      <div class="w-full h-2 bg-gray-100 rounded-full overflow-hidden mb-10 max-w-[16rem]">
        <div class="h-full bg-indigo-500 rounded-full" style="width:${Math.min(100, Math.round(p.words / goal * 100))}%"></div>
      </div>
      <button class="btn-primary w-full" onclick="goHome()">次のセンテンスへ</button>
    </div>`;
}

function renderDayComplete(p) {
  app.innerHTML = `
    ${header("", false, false)}
    <div class="flex-1 flex flex-col items-center justify-center px-8 fade-in">
      <div class="text-6xl mb-6">🌙</div>
      <div class="text-2xl font-bold mb-3">お疲れ様、また明日</div>
      <p class="text-gray-500 text-center leading-relaxed mb-10">今日は ${p.words} 語やりきった。<br>続けることがいちばん大事。</p>
      <button class="btn-secondary w-full" onclick="goHome()">ホームに戻る</button>
    </div>`;
}

/* ============================================================
   起動
============================================================ */
goHome();
</script>
</body>
</html>
